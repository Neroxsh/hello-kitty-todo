name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            bundles: --bundles dmg
          - platform: windows-latest
            bundles: --bundles nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.bundles }}
          tagName: ${{ github.ref_name }}
          releaseName: "我的任务 ${{ github.ref_name }}"
          releaseBody: |
            🎉 新版本发布！

            下载安装包后即可使用：

            - macOS：下载 `.dmg`
            - Windows：下载 `.exe`

            macOS 版本暂未签名，第一次打开时可能需要右键选择“打开”。
          releaseDraft: false
          prerelease: false
